<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái Tim Thủ Khoa Lý - Phiên bản Python (v5)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background-color: black;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-family: Arial, sans-serif;
            border: 1px solid white;
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">← Quay lại</a>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        const CANVAS_WIDTH = window.innerWidth;
        const CANVAS_HEIGHT = window.innerHeight;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        const CANVAS_CENTER_X = CANVAS_WIDTH / 2;
        const CANVAS_CENTER_Y = CANVAS_HEIGHT / 2;
        const IMAGE_ENLARGE = 11;
        const HEART_COLOR = "#f76070";

        function heartFunction(t, shrinkRatio = IMAGE_ENLARGE) {
            let x = 16 * (Math.sin(t) ** 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

            x *= shrinkRatio;
            y *= shrinkRatio;

            x += CANVAS_CENTER_X;
            y += CANVAS_CENTER_Y;

            return [Math.floor(x), Math.floor(y)];
        }

        function scatterInside(x, y, beta = 0.15) {
            let ratioX = -beta * Math.log(Math.random());
            let ratioY = -beta * Math.log(Math.random());

            let dx = ratioX * (x - CANVAS_CENTER_X);
            let dy = ratioY * (y - CANVAS_CENTER_Y);

            return [x - dx, y - dy];
        }

        function shrink(x, y, ratio) {
            let force = -1 / (((x - CANVAS_CENTER_X) ** 2 + (y - CANVAS_CENTER_Y) ** 2) ** 0.6);
            let dx = ratio * force * (x - CANVAS_CENTER_X);
            let dy = ratio * force * (y - CANVAS_CENTER_Y);
            return [x - dx, y - dy];
        }

        function curve(p) {
            return 2 * (2 * Math.sin(4 * p)) / (2 * Math.PI);
        }

        class Heart {
            constructor(generateFrame = 20) {
                this.points = new Set();
                this.edgeDiffusionPoints = new Set();
                this.centerDiffusionPoints = new Set();
                this.allPoints = {};
                this.build(2000);

                this.generateFrame = generateFrame;
                for (let frame = 0; frame < generateFrame; frame++) {
                    this.calc(frame);
                }
            }

            build(number) {
                for (let i = 0; i < number; i++) {
                    let t = Math.random() * 2 * Math.PI;
                    let [x, y] = heartFunction(t);
                    this.points.add(`${x},${y}`);
                }

                let pointsList = Array.from(this.points).map(p => p.split(',').map(Number));
                pointsList.forEach(([px, py]) => {
                    for (let i = 0; i < 3; i++) {
                        let [x, y] = scatterInside(px, py, 0.05);
                        this.edgeDiffusionPoints.add(`${x},${y}`);
                    }
                });

                for (let i = 0; i < 4000; i++) {
                    let [px, py] = pointsList[Math.floor(Math.random() * pointsList.length)];
                    let [x, y] = scatterInside(px, py, 0.17);
                    this.centerDiffusionPoints.add(`${x},${y}`);
                }
            }

            calcPosition(x, y, ratio) {
                let force = 1 / (((x - CANVAS_CENTER_X) ** 2 + (y - CANVAS_CENTER_Y) ** 2) ** 0.520);
                let dx = ratio * force * (x - CANVAS_CENTER_X) + Math.floor(Math.random() * 3 - 1);
                let dy = ratio * force * (y - CANVAS_CENTER_Y) + Math.floor(Math.random() * 3 - 1);
                return [x - dx, y - dy];
            }

            calc(generateFrame) {
                let ratio = 10 * curve(generateFrame / 10 * Math.PI);
                let haloRadius = Math.floor(4 + 6 * (1 + curve(generateFrame / 10 * Math.PI)));
                let haloNumber = Math.floor(3000 + 4000 * Math.abs(curve(generateFrame / 10 * Math.PI) ** 2));

                let allPoints = [];
                let heartHaloPoint = new Set();

                for (let i = 0; i < haloNumber; i++) {
                    let t = Math.random() * 2 * Math.PI;
                    let [x, y] = heartFunction(t, 11.6);
                    let [sx, sy] = shrink(x, y, haloRadius);
                    if (!heartHaloPoint.has(`${Math.floor(sx)},${Math.floor(sy)}`)) {
                        heartHaloPoint.add(`${Math.floor(sx)},${Math.floor(sy)}`);
                        sx += Math.floor(Math.random() * 29 - 14);
                        sy += Math.floor(Math.random() * 29 - 14);
                        let size = Math.random() < 0.33 ? 1 : 2;
                        allPoints.push([sx, sy, size]);
                    }
                }

                this.points.forEach(p => {
                    let [px, py] = p.split(',').map(Number);
                    let [x, y] = this.calcPosition(px, py, ratio);
                    let size = Math.floor(Math.random() * 3 + 1);
                    allPoints.push([x, y, size]);
                });

                this.edgeDiffusionPoints.forEach(p => {
                    let [px, py] = p.split(',').map(Number);
                    let [x, y] = this.calcPosition(px, py, ratio);
                    let size = Math.floor(Math.random() * 2 + 1);
                    allPoints.push([x, y, size]);
                });

                this.centerDiffusionPoints.forEach(p => {
                    let [px, py] = p.split(',').map(Number);
                    let [x, y] = this.calcPosition(px, py, ratio);
                    let size = Math.floor(Math.random() * 2 + 1);
                    allPoints.push([x, y, size]);
                });

                this.allPoints[generateFrame] = allPoints;
            }

            render(ctx, frame) {
                ctx.fillStyle = HEART_COLOR;
                let points = this.allPoints[frame % this.generateFrame];
                points.forEach(([x, y, size]) => {
                    ctx.fillRect(x, y, size, size);
                });
            }
        }

        const heart = new Heart();
        let frame = 0;

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            heart.render(ctx, frame);
            frame++;
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Note: Recalculating everything on resize would be slow, 
            // but for this simple version we just keep the center X/Y.
        });
    </script>
</body>
</html>
