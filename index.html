<!DOCTYPE HTML>
<html lang="vi">

<head>
    <title>Trái Tim</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body {
            height: 100%;
            padding: 0;
            margin: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        #pinkboard {
            z-index: 1;
            animation: heart-pulse 1.3s ease-in-out infinite;
        }

        @keyframes heart-pulse {
            0% {
                transform: scale(0.9);
            }

            30% {
                transform: scale(1.1);
            }

            60% {
                transform: scale(0.95);
            }

            100% {
                transform: scale(0.9);
            }
        }

        .name-overlay {
            position: absolute;
            z-index: 2;
            color: #ea80b0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 24px;
            font-weight: 300;
            text-shadow: 0 0 20px #ea80b0;
            opacity: 0.8;
            letter-spacing: 5px;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <canvas id="pinkboard"></canvas>

    <script>
        /*
         * Cấu hình hiệu ứng
         */
        const settings = {
            particles: {
                length: 2500,    // Số lượng hạt (Tăng lên để lung linh hơn)
                duration: 2,     // Thời gian tồn tại của hạt (giây)
                velocity: 120,    // Tốc độ hạt
                effect: -0.85,    // Độ phân tán
                size: 10,         // Kích thước hạt
            },
        };

        /*
         * Polyfill cho RequestAnimationFrame
         */
        (function () {
            let lastTime = 0;
            const vendors = ["ms", "moz", "webkit", "o"];
            for (let x = 0; x < vendors.length && !window.requestAnimationFrame; ++x) {
                window.requestAnimationFrame = window[vendors[x] + "RequestAnimationFrame"];
                window.cancelAnimationFrame = window[vendors[x] + "CancelAnimationFrame"] || window[vendors[x] + "CancelRequestAnimationFrame"];
            }
            if (!window.requestAnimationFrame) {
                window.requestAnimationFrame = function (callback) {
                    const currTime = new Date().getTime();
                    const timeToCall = Math.max(0, 16 - (currTime - lastTime));
                    const id = window.setTimeout(function () { callback(currTime + timeToCall); }, timeToCall);
                    lastTime = currTime + timeToCall;
                    return id;
                };
            }
            if (!window.cancelAnimationFrame) {
                window.cancelAnimationFrame = function (id) { clearTimeout(id); };
            }
        }());

        /*
         * Lớp Point (Điểm số)
         */
        class Point {
            constructor(x = 0, y = 0) {
                this.x = x;
                this.y = y;
            }
            clone() { return new Point(this.x, this.y); }
            length(length) {
                if (typeof length == 'undefined') return Math.sqrt(this.x * this.x + this.y * this.y);
                this.normalize();
                this.x *= length;
                this.y *= length;
                return this;
            }
            normalize() {
                const length = this.length();
                this.x /= length;
                this.y /= length;
                return this;
            }
        }

        /*
         * Lớp Particle (Hạt sáng)
         */
        class Particle {
            constructor() {
                this.position = new Point();
                this.velocity = new Point();
                this.acceleration = new Point();
                this.age = 0;
            }
            initialize(x, y, dx, dy) {
                this.position.x = x;
                this.position.y = y;
                this.velocity.x = dx;
                this.velocity.y = dy;
                this.acceleration.x = dx * settings.particles.effect;
                this.acceleration.y = dy * settings.particles.effect;
                this.age = 0;
            }
            update(deltaTime) {
                this.position.x += this.velocity.x * deltaTime;
                this.position.y += this.velocity.y * deltaTime;
                this.velocity.x += this.acceleration.x * deltaTime;
                this.velocity.y += this.acceleration.y * deltaTime;
                this.age += deltaTime;
            }
            draw(context, image) {
                const ease = (t) => (--t) * t * t + 1;
                const size = image.width * ease(this.age / settings.particles.duration);
                context.globalAlpha = 1 - this.age / settings.particles.duration;
                context.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
            }
        }

        /*
         * Quản lý ParticlePool (Bể hạt)
         */
        class ParticlePool {
            constructor(length) {
                this.particles = new Array(length).fill(null).map(() => new Particle());
                this.firstActive = 0;
                this.firstFree = 0;
                this.duration = settings.particles.duration;
            }
            add(x, y, dx, dy) {
                this.particles[this.firstFree].initialize(x, y, dx, dy);
                this.firstFree++;
                if (this.firstFree === this.particles.length) this.firstFree = 0;
                if (this.firstActive === this.firstFree) this.firstActive++;
                if (this.firstActive === this.particles.length) this.firstActive = 0;
            }
            update(deltaTime) {
                let i;
                if (this.firstActive < this.firstFree) {
                    for (i = this.firstActive; i < this.firstFree; i++) this.particles[i].update(deltaTime);
                }
                if (this.firstFree < this.firstActive) {
                    for (i = this.firstActive; i < this.particles.length; i++) this.particles[i].update(deltaTime);
                    for (i = 0; i < this.firstFree; i++) this.particles[i].update(deltaTime);
                }
                while (this.particles[this.firstActive].age >= this.duration && this.firstActive !== this.firstFree) {
                    this.firstActive++;
                    if (this.firstActive === this.particles.length) this.firstActive = 0;
                }
            }
            draw(context, image) {
                let i;
                if (this.firstActive < this.firstFree) {
                    for (i = this.firstActive; i < this.firstFree; i++) this.particles[i].draw(context, image);
                }
                if (this.firstFree < this.firstActive) {
                    for (i = this.firstActive; i < this.particles.length; i++) this.particles[i].draw(context, image);
                    for (i = 0; i < this.firstFree; i++) this.particles[i].draw(context, image);
                }
            }
        }

        /*
         * Khởi tạo hiệu ứng
         */
        (function (canvas) {
            const context = canvas.getContext('2d');
            const particles = new ParticlePool(settings.particles.length);
            const particleRate = settings.particles.length / settings.particles.duration;
            let time;

            // Hàm tạo hình trái tim lý tưởng
            function pointOnHeart(t) {
                return new Point(
                    160 * Math.pow(Math.sin(t), 3),
                    130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25
                );
            }

            // Tạo texture hạt bụi phát sáng
            const image = (function () {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = settings.particles.size;
                canvas.height = settings.particles.size;

                function to(t) {
                    const point = pointOnHeart(t);
                    point.x = settings.particles.size / 3 + point.x * settings.particles.size / 550;
                    point.y = settings.particles.size / 3 - point.y * settings.particles.size / 550;
                    return point;
                }

                context.beginPath();
                let t = -Math.PI;
                let point = to(t);
                context.moveTo(point.x, point.y);
                while (t < Math.PI) {
                    t += 0.01;
                    point = to(t);
                    context.lineTo(point.x, point.y);
                }
                context.closePath();
                context.fillStyle = '#ea80b0'; // Giữ nguyên màu của bạn
                context.fill();

                // Thêm hiệu ứng Glow cho texture
                const img = new Image();
                img.src = canvas.toDataURL();
                return img;
            })();

            function render() {
                requestAnimationFrame(render);
                const newTime = new Date().getTime() / 1000;
                const deltaTime = newTime - (time || newTime);
                time = newTime;

                context.clearRect(0, 0, canvas.width, canvas.height);

                const amount = particleRate * deltaTime;
                for (let i = 0; i < amount; i++) {
                    let pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
                    // Tỏa sâu vào trong khoảng 30%
                    const factor = 1 - 0.3 * Math.random();
                    pos.x *= factor;
                    pos.y *= factor;

                    const dir = pos.clone().length(settings.particles.velocity);
                    particles.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
                }

                particles.update(deltaTime);
                particles.draw(context, image);
            }

            function onResize() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
            }
            window.onresize = onResize;

            setTimeout(function () {
                onResize();
                render();
            }, 10);
        })(document.getElementById('pinkboard'));
    </script>
</body>

</html>
